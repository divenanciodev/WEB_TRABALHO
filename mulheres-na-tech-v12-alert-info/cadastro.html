<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cadastro • She.Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.456.0/font/lucide.css">
<link rel="stylesheet" href="css/she-style.css" />
</head>
<body class="auth-page">
  <header class="auth-header">
    <a href="index.html" class="logo"><span class="logo-mark">◆</span><span class="logo-text">She<span class="accent">.Tech</span></span></a>
  </header>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Criar Conta</h2>
      <form id="register-form">
        <div class="form-group"><label>Nome Completo</label><input type="text" id="nome_completo" required /></div>
        <div class="form-group"><label>Nome de Usuário</label><input type="text" id="nome_usuario" required /></div>
        <div class="form-group"><label>E-mail</label><input type="email" id="email" required /></div>
        <div class="form-group"><label>Senha</label><input type="password" id="senha" required /></div>
        <div class="form-group"><label>Confirmação de Senha</label><input type="password" id="confirmar_senha" required /></div>
        <div class="form-group"><label class="checkbox-label"><input type="checkbox" required /> Aceito os termos e privacidade</label></div>
        <button type="submit" class="btn btn-primary" style="width:100%"><i class="lucide-user-plus"></i> Cadastrar</button>
      </form>
      <p>Já tem conta? <a href="login.html">Login</a></p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      if (document.getElementById('senha').value !== document.getElementById('confirmar_senha').value) {
        alert('As senhas não coincidem!');
        return;
      }
      const newUser = {
        nome_completo: document.getElementById('nome_completo').value,
        nome_usuario: document.getElementById('nome_usuario').value,
        email: document.getElementById('email').value,
        data_cadastro: new Date().toISOString()
      };
      const users = State.getUsers();
      if (users.find(u => u.email === newUser.email || u.nome_usuario === newUser.nome_usuario)) {
        alert('E-mail ou nome de usuário já cadastrado!');
        return;
      }
      users.push(newUser);
      State.setUsers(users);
      alert('Cadastro realizado com sucesso!');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
