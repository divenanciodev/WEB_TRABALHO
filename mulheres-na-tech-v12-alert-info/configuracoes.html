<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Configurações • She.Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.456.0/font/lucide.css">
<link rel="stylesheet" href="css/she-style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><span class="logo-mark">◆</span><span class="logo-text">She<span class="accent">.Tech</span></span></div>
    <nav class="nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="lucide-home"></i> <span class="nav-label">Início</span></a>
      <a href="projetos.html" class="nav-item" data-page="projetos"><i class="lucide-folder-kanban"></i> <span class="nav-label">Projetos</span></a>
      <a href="eventos.html" class="nav-item" data-page="eventos"><i class="lucide-calendar-days"></i> <span class="nav-label">Eventos</span></a>
      <a href="comunidade.html" class="nav-item" data-page="comunidade"><i class="lucide-users"></i> <span class="nav-label">Comunidade</span></a>
      <a href="perfil.html" class="nav-item" data-page="perfil"><i class="lucide-user"></i> <span class="nav-label">Perfil</span></a>
      <a href="configuracoes.html" class="nav-item active" data-page="configuracoes"><i class="lucide-settings"></i> <span class="nav-label">Configurações</span></a>
    </nav>
    <div class="sidebar-foot" style="margin-top:auto">
      <div class="mini-card"><div class="mini-title">Membro She.Tech</div><div class="mini-sub" id="sidebar-member-since">Desde 2026</div></div>
      <button onclick="State.logout()" class="nav-item" style="width:100%;text-align:left;background:transparent;border:none;margin-top:12px"><i class="lucide-log-out"></i> <span class="nav-label">Sair</span></button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 class="page-title" id="page-title">Configurações</h1>
      <div class="topbar-actions">
        <button class="icon-btn" title="Notificações" onclick="window.location.href='notificacoes.html'"><i class="lucide-bell"></i><span class="dot" id="notif-dot" style="display:none"></span></button>
        <a href="perfil.html" class="me"><img id="top-avatar" src="" alt="" /><span id="top-name">Olá</span></a>
      </div>
    </header>

    <div class="page-content">
      <div class="content-grid">
        <div class="col">
          <div class="card">
            <div class="card-head"><h3><i class="lucide-plug"></i> Integrações</h3></div>
            <p style="color:var(--gray-500);font-size:14px;margin-bottom:12px">Conecte sua conta com outras plataformas.</p>
            <div class="discord-card">
              <div><strong>Discord da Comunidade</strong><p>Acesse nosso servidor exclusivo</p></div>
              <a href="https://discord.gg/v9P2EzJ7h" target="_blank" class="btn-discord">Conectar</a>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="card">
            <div class="card-head"><h3><i class="lucide-shield"></i> Privacidade</h3></div>
            <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="pref-public" checked /> Mostrar meu perfil publicamente</label></div>
            <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="pref-email" checked /> Receber notificações por e-mail</label></div>
            <button class="btn btn-primary" onclick="savePrefs()"><i class="lucide-save"></i> Salvar Preferências</button>
          </div>
        </div>
        <div class="col">
          <div class="card">
            <div class="card-head"><h3><i class="lucide-user-cog"></i> Conta</h3></div>
            <p style="color:var(--gray-500);font-size:14px;margin-bottom:16px">Gerencie sua conta She.Tech.</p>
            <a href="editar-perfil.html" class="btn btn-ghost" style="width:100%;margin-bottom:10px"><i class="lucide-pencil"></i> Editar perfil</a>
            <button class="btn btn-ghost" style="width:100%;border-color:var(--pink);color:var(--pink)"><i class="lucide-trash-2"></i> Excluir Minha Conta</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    let user = Layout.init({ active: 'configuracoes', title: 'Configurações' });
    if (!user) throw new Error('auth');

    document.getElementById('pref-public').checked = user.perfil_publico !== false;
    document.getElementById('pref-email').checked = user.notif_email !== false;

    function savePrefs() {
      user = State.getCurrentUser();
      State.setCurrentUser({
        ...user,
        perfil_publico: document.getElementById('pref-public').checked,
        notif_email: document.getElementById('pref-email').checked
      });
      State.addNotification(user.email, 'Suas preferências de privacidade foram atualizadas.');
      Layout.showToast('Preferências salvas!');
    }
  </script>
</body>
</html>
