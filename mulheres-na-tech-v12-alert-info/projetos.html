<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projetos • She.Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.456.0/font/lucide.css">
<link rel="stylesheet" href="css/she-style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><span class="logo-mark">◆</span><span class="logo-text">She<span class="accent">.Tech</span></span></div>
    <nav class="nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="lucide-home"></i> <span class="nav-label">Início</span></a>
      <a href="projetos.html" class="nav-item active" data-page="projetos"><i class="lucide-folder-kanban"></i> <span class="nav-label">Projetos</span></a>
      <a href="eventos.html" class="nav-item" data-page="eventos"><i class="lucide-calendar-days"></i> <span class="nav-label">Eventos</span></a>
      <a href="comunidade.html" class="nav-item" data-page="comunidade"><i class="lucide-users"></i> <span class="nav-label">Comunidade</span></a>
      <a href="perfil.html" class="nav-item" data-page="perfil"><i class="lucide-user"></i> <span class="nav-label">Perfil</span></a>
      <a href="configuracoes.html" class="nav-item" data-page="configuracoes"><i class="lucide-settings"></i> <span class="nav-label">Configurações</span></a>
    </nav>
    <div class="sidebar-foot" style="margin-top:auto">
      <div class="mini-card"><div class="mini-title">Membro She.Tech</div><div class="mini-sub" id="sidebar-member-since">Desde 2026</div></div>
      <button onclick="State.logout()" class="nav-item" style="width:100%;text-align:left;background:transparent;border:none;margin-top:12px"><i class="lucide-log-out"></i> <span class="nav-label">Sair</span></button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 class="page-title" id="page-title">Projetos</h1>
      <div class="topbar-actions">
        <button class="icon-btn" title="Notificações" onclick="window.location.href='notificacoes.html'"><i class="lucide-bell"></i><span class="dot" id="notif-dot" style="display:none"></span></button>
        <a href="perfil.html" class="me"><img id="top-avatar" src="" alt="" /><span id="top-name">Olá</span></a>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <p style="color:var(--gray-500);font-size:14px">Projetos colaborativos da comunidade</p>
        <button class="btn btn-primary" onclick="UI.showModal('project-modal')"><i class="lucide-plus"></i> Criar Projeto</button>
      </div>
      <div id="projects-list"></div>
    </div>
  </main>

  <div id="project-modal" class="modal">
    <div class="modal-content">
      <h2>Novo Projeto</h2>
      <form id="project-form" style="margin-top:1rem">
        <div class="form-group"><label>Título</label><input type="text" id="proj-titulo" required /></div>
        <div class="form-group"><label>Descrição</label><textarea id="proj-descricao" required></textarea></div>
        <div class="form-group"><label>Categoria</label><input type="text" id="proj-categoria" placeholder="Ex: Web, Mobile, Data Science" /></div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="UI.closeModal('project-modal')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const user = Layout.init({ active: 'projetos', title: 'Projetos' });
    if (!user) throw new Error('auth');

    function renderProjects() {
      const container = document.getElementById('projects-list');
      const projects = State.getProjects();
      if (!projects.length) {
        container.innerHTML = '<div class="card"><p style="color:var(--gray-500);text-align:center">Nenhum projeto ainda. Crie o primeiro!</p></div>';
        return;
      }
      container.innerHTML = projects.map(p => `
        <div class="list-item">
          <div>
            <h4>${p.titulo}</h4>
            <p>${p.descricao}</p>
            <span class="tag-pill">${p.categoria || 'Geral'}</span>
            <span class="tag-pill" style="background:var(--gray-100);color:var(--gray-700)">${p.status || 'Ativo'}</span>
          </div>
          <button class="btn btn-ghost">Ver Detalhes</button>
        </div>`).join('');
    }

    document.getElementById('project-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const proj = {
        titulo: document.getElementById('proj-titulo').value,
        descricao: document.getElementById('proj-descricao').value,
        categoria: document.getElementById('proj-categoria').value,
        status: 'Ativo',
        proprietaria_id: user.email
      };
      State.saveData('projects', proj);
      UI.closeModal('project-modal');
      e.target.reset();
      renderProjects();
      State.addNotification(user.email, `Você criou o projeto: ${proj.titulo}`);
      Layout.showToast('Projeto criado!');
    });

    renderProjects();
  </script>
</body>
</html>
