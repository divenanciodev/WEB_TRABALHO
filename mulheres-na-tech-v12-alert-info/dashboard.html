<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SheTech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.456.0/font/lucide.css">
  <link rel="stylesheet" href="css/she-style.css" />
</head>

<body>
  <aside class="sidebar">
    <div class="logo"><span class="logo-text">She<span class="accent">Tech</span></span>
    </div>
    <nav class="nav">
      <a href="dashboard.html" class="nav-item active" data-page="dashboard"><i class="lucide-home"></i> <span
          class="nav-label">Início</span></a>
      <a href="projetos.html" class="nav-item" data-page="projetos"><i class="lucide-folder-kanban"></i> <span
          class="nav-label">Projetos</span></a>
      <a href="eventos.html" class="nav-item" data-page="eventos"><i class="lucide-calendar-days"></i> <span
          class="nav-label">Eventos</span></a>
      <a href="comunidade.html" class="nav-item" data-page="comunidade"><i class="lucide-users"></i> <span
          class="nav-label">Comunidade</span></a>
      <a href="perfil.html" class="nav-item" data-page="perfil"><i class="lucide-user"></i> <span
          class="nav-label">Perfil</span></a>
      <a href="configuracoes.html" class="nav-item" data-page="configuracoes"><i class="lucide-settings"></i> <span
          class="nav-label">Configurações</span></a>
    </nav>
    <div class="sidebar-foot" style="margin-top:auto">
      <div class="mini-card">
        <div class="mini-title">Membro SheTech</div>
        <div class="mini-sub" id="sidebar-member-since">Desde 2026</div>
      </div>
      <button onclick="State.logout()" class="nav-item"
        style="width:100%;text-align:left;background:transparent;border:none;margin-top:12px"><i
          class="lucide-log-out"></i> <span class="nav-label">Sair</span></button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 class="page-title" id="page-title">Início</h1>

      <div class="topbar-actions">
        <button class="icon-btn" title="Notificações" onclick="window.location.href='notificacoes.html'">

          <i class="icon-bell"></i>

          <span class="dot" id="notif-dot" style="display:none"></span>
        </button>

        <a href="perfil.html" class="me">
          <img id="top-avatar" src="" alt="">
          <span id="top-name">Olá</span>
        </a>
      </div>
    </header>

    <div class="page-content">
      <p style="color:var(--gray-500);font-size:15px" id="welcome-sub">Bem-vinda de volta à SheTech</p>

      <div class="dashboard-grid">
        <div class="card stat-card">
          <h3><i class="lucide-folder-kanban"></i> Projetos Ativos</h3>
          <div class="stat-num" id="dash-projects-count">0</div>
          <a href="projetos.html" class="btn btn-primary">Ver Todos</a>
        </div>
        <div class="card stat-card">
          <h3><i class="lucide-calendar-days"></i> Eventos</h3>
          <div class="stat-num" id="dash-events-count">0</div>
          <a href="eventos.html" class="btn btn-primary">Ver Todos</a>
        </div>
        <div class="card stat-card">
          <h3><i class="lucide-link"></i> Meus Links</h3>
          <div class="stat-num" id="dash-links-count">0</div>
          <a href="comunidade.html?tab=links" class="btn btn-primary">Gerenciar</a>
        </div>
      </div>

      <div class="profile-grid">
        <div class="col" style="grid-column:span 1">
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const user = Layout.init({ active: 'dashboard', title: 'Início' });
    if (!user) throw new Error('auth');

    document.getElementById('welcome-sub').innerText = `Bem-vinda de volta, ${user.nome_completo.split(' ')[0]}!`;
    document.getElementById('dash-projects-count').innerText = State.getProjects().length;
    document.getElementById('dash-events-count').innerText = State.getEvents().length;
    document.getElementById('dash-links-count').innerText = State.getLinks(user.email).length;

    const posts = State.getPosts().slice(-3).reverse();
    const list = document.getElementById('recent-posts');
    list.innerHTML = posts.length ? posts.map(p => `
      <li style="padding:12px 0;border-bottom:1px solid var(--gray-200);font-size:14px">
        <strong>${p.autor_nome}:</strong> ${p.conteudo.substring(0, 60)}${p.conteudo.length > 60 ? '...' : ''}
      </li>`).join('') : '<li style="color:var(--gray-500)">Nenhuma publicação recente.</li>';
  </script>
</body>

</html>
