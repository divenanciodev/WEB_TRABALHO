<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Comunidade • She.Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.456.0/font/lucide.css">
<link rel="stylesheet" href="css/she-style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><span class="logo-mark">◆</span><span class="logo-text">She<span class="accent">.Tech</span></span></div>
    <nav class="nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="lucide-home"></i> <span class="nav-label">Início</span></a>
      <a href="projetos.html" class="nav-item" data-page="projetos"><i class="lucide-folder-kanban"></i> <span class="nav-label">Projetos</span></a>
      <a href="eventos.html" class="nav-item" data-page="eventos"><i class="lucide-calendar-days"></i> <span class="nav-label">Eventos</span></a>
      <a href="comunidade.html" class="nav-item active" data-page="comunidade"><i class="lucide-users"></i> <span class="nav-label">Comunidade</span></a>
      <a href="perfil.html" class="nav-item" data-page="perfil"><i class="lucide-user"></i> <span class="nav-label">Perfil</span></a>
      <a href="configuracoes.html" class="nav-item" data-page="configuracoes"><i class="lucide-settings"></i> <span class="nav-label">Configurações</span></a>
    </nav>
    <div class="sidebar-foot" style="margin-top:auto">
      <div class="mini-card"><div class="mini-title">Membro She.Tech</div><div class="mini-sub" id="sidebar-member-since">Desde 2026</div></div>
      <button onclick="State.logout()" class="nav-item" style="width:100%;text-align:left;background:transparent;border:none;margin-top:12px"><i class="lucide-log-out"></i> <span class="nav-label">Sair</span></button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="search" id="topbar-search">
        <i class="lucide-search"></i>
        <input type="text" id="community-search" placeholder="Buscar projetos, pessoas, eventos..." />
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" title="Notificações" onclick="window.location.href='notificacoes.html'"><i class="lucide-bell"></i><span class="dot" id="notif-dot" style="display:none"></span></button>
        <a href="perfil.html" class="me"><img id="top-avatar" src="" alt="" /><span id="top-name">Olá</span></a>
      </div>
    </header>

    <div class="page-content">
      <div class="community-tabs">
        <div class="community-tab active" id="tab-feed" onclick="switchTab('feed')">Feed</div>
        <div class="community-tab" id="tab-links" onclick="switchTab('links')">Meus Links</div>
        <div class="community-tab" id="tab-members" onclick="switchTab('members')">Membros</div>
      </div>

      <div id="section-feed" class="social-feed">
        <div class="post-composer">
          <div class="post-composer-head">
            <img id="post-avatar" src="" alt="" />
            <input type="text" id="post-text" placeholder="O que você está pensando?" />
          </div>
          <div class="post-composer-foot">
            <div style="display:flex;gap:12px;color:var(--gray-500);font-size:13px">
              <span class="post-action"><i class="lucide-image"></i> Foto</span>
              <span class="post-action"><i class="lucide-map-pin"></i> Local</span>
            </div>
            <button class="btn btn-primary" onclick="createPost()"><i class="lucide-send"></i> Publicar</button>
          </div>
        </div>
        <div id="social-feed-list"></div>
      </div>

      <div id="section-links" style="display:none">
        <div class="page-header">
          <h2>Meus Links Salvos</h2>
          <button class="btn btn-primary" onclick="UI.showModal('link-modal')"><i class="lucide-plus"></i> Adicionar Link</button>
        </div>
        <div id="links-container"></div>
      </div>

      <div id="section-members" style="display:none">
        <h2 style="margin-bottom:16px;font-size:20px">Membros da Comunidade</h2>
        <div id="members-grid" class="member-grid"></div>
      </div>
    </div>
  </main>

  <div id="link-modal" class="modal">
    <div class="modal-content">
      <h2 id="modal-title">Novo Link</h2>
      <form id="link-form" style="margin-top:1rem">
        <input type="hidden" id="link-id" />
        <div class="form-group"><label>Título</label><input type="text" id="link-titulo" required /></div>
        <div class="form-group"><label>URL</label><input type="url" id="link-url" required /></div>
        <div class="form-group"><label>Descrição</label><input type="text" id="link-descricao" /></div>
        <div class="form-group"><label>Categoria</label><input type="text" id="link-categoria" /></div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="UI.closeModal('link-modal')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  <script>
    const user = Layout.init({ active: 'comunidade', showSearch: true });
    if (!user) throw new Error('auth');

    document.getElementById('post-avatar').src = user.foto_perfil || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.nome_completo)}&background=ff3d8b&color=fff`;

    let searchQuery = '';

    document.getElementById('community-search').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase().trim();
      if (document.getElementById('section-feed').style.display !== 'none') renderFeed();
      if (document.getElementById('section-members').style.display !== 'none') renderMembers();
    });

    function switchTab(tab) {
      document.querySelectorAll('.community-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.getElementById('section-feed').style.display = tab === 'feed' ? 'block' : 'none';
      document.getElementById('section-links').style.display = tab === 'links' ? 'block' : 'none';
      document.getElementById('section-members').style.display = tab === 'members' ? 'block' : 'none';
      if (tab === 'feed') renderFeed();
      if (tab === 'links') renderLinks();
      if (tab === 'members') renderMembers();
    }

    function createPost() {
      const text = document.getElementById('post-text').value;
      if (!text) return;
      State.saveData('posts', {
        conteudo: text,
        autor_nome: user.nome_completo,
        autor_user: user.nome_usuario,
        autor_avatar: user.foto_perfil,
        likes: 0, comments: 0
      });
      document.getElementById('post-text').value = '';
      renderFeed();
      Layout.showToast('Publicação criada!');
    }

    function renderFeed() {
      const container = document.getElementById('social-feed-list');
      let posts = State.getPosts().reverse();
      if (searchQuery) {
        posts = posts.filter(p =>
          p.conteudo.toLowerCase().includes(searchQuery) ||
          p.autor_nome.toLowerCase().includes(searchQuery) ||
          (p.autor_user || '').toLowerCase().includes(searchQuery)
        );
      }
      container.innerHTML = posts.length ? posts.map(p => `
        <div class="post-card">
          <div class="post-card-head">
            <div class="post-user">
              <img src="${p.autor_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.autor_nome)}&background=ff3d8b&color=fff`}" alt="" />
              <div><strong>${p.autor_nome}</strong><br><small>${new Date(p.createdAt).toLocaleDateString('pt-BR')} · @${p.autor_user || 'usuario'}</small></div>
            </div>
          </div>
          <div class="post-card-body"><p>${p.conteudo}</p></div>
          <div class="post-card-foot">
            <span class="post-action"><i class="lucide-heart"></i> ${p.likes || 0}</span>
            <span class="post-action"><i class="lucide-message-circle"></i> ${p.comments || 0}</span>
          </div>
        </div>`).join('') : '<div class="card"><p style="color:var(--gray-500);text-align:center">Nenhuma publicação encontrada.</p></div>';
    }

    function renderLinks() {
      const container = document.getElementById('links-container');
      let links = State.getLinks(user.email);
      if (searchQuery) links = links.filter(l => (l.titulo + l.descricao + l.categoria).toLowerCase().includes(searchQuery));
      container.innerHTML = links.length ? links.map(link => `
        <div class="card link-row">
          <div>
            <h4 style="font-family:Sora;margin-bottom:4px">${link.titulo}</h4>
            <p style="font-size:14px;color:var(--gray-500);margin-bottom:6px">${link.descricao || 'Sem descrição'}</p>
            <a href="${link.url}" target="_blank" style="color:var(--pink);font-size:13px">${link.url}</a>
            <span class="tag-pill" style="margin-left:8px">${link.categoria || 'Geral'}</span>
          </div>
          <div style="display:flex;gap:8px">
            <button onclick="toggleFav(${link.id})" class="btn btn-ghost">${link.favorito ? '★' : '☆'}</button>
            <button onclick="deleteLink(${link.id})" class="btn btn-ghost" style="color:var(--pink)"><i class="lucide-trash-2"></i></button>
          </div>
        </div>`).join('') : '<div class="card"><p style="color:var(--gray-500);text-align:center">Nenhum link salvo.</p></div>';
    }

    function renderMembers() {
      const container = document.getElementById('members-grid');
      let users = State.getUsers();
      if (searchQuery) {
        users = users.filter(u =>
          u.nome_completo.toLowerCase().includes(searchQuery) ||
          (u.nome_usuario || '').toLowerCase().includes(searchQuery) ||
          (u.cargo || '').toLowerCase().includes(searchQuery)
        );
      }
      container.innerHTML = users.length ? users.map(u => `
        <div class="card member-card">
          <img src="${u.foto_perfil || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.nome_completo)}&background=ff3d8b&color=fff`}" alt="" />
          <h4>${u.nome_completo}</h4>
          <p style="font-size:13px;color:var(--pink);margin:4px 0">@${u.nome_usuario}</p>
          <p style="font-size:12px;color:var(--gray-500)">${u.cargo || 'Membra She.Tech'}</p>
          <a href="perfil.html" class="btn btn-ghost" style="margin-top:12px;width:100%">Ver perfil</a>
        </div>`).join('') : '<p style="color:var(--gray-500)">Nenhuma membra encontrada.</p>';
    }

    document.getElementById('link-form').addEventListener('submit', (e) => {
      e.preventDefault();
      State.saveLink({
        titulo: document.getElementById('link-titulo').value,
        url: document.getElementById('link-url').value,
        descricao: document.getElementById('link-descricao').value,
        categoria: document.getElementById('link-categoria').value,
        proprietaria_id: user.email
      });
      UI.closeModal('link-modal');
      e.target.reset();
      renderLinks();
      Layout.showToast('Link salvo!');
    });

    function deleteLink(id) {
      if (confirm('Excluir link?')) { State.deleteLink(id); renderLinks(); }
    }
    function toggleFav(id) { State.toggleFavoriteLink(id); renderLinks(); }

    document.addEventListener('DOMContentLoaded', () => {
      const tab = new URLSearchParams(location.search).get('tab') || 'feed';
      switchTab(tab);
    });
  </script>
</body>
</html>
