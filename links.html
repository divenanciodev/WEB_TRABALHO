<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links • SheTech</title>
    <link rel="stylesheet" href="vendor/fonts/fonts.css">
    <link rel="stylesheet" href="vendor/lucide/lucide.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/links.css">
</head>
<body>
        <aside class="sidebar">
    <div class="logo"><span class="logo-text">She<span class="accent">Tech</span></span></div>
    <nav class="nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="icon-house"></i> <span class="nav-label">Início</span></a>
      <a href="projetos.html" class="nav-item" data-page="projetos"><i class="icon-folder-kanban"></i> <span class="nav-label">Projetos</span></a>
      <a href="eventos.html" class="nav-item" data-page="eventos"><i class="icon-calendar-days"></i> <span class="nav-label">Eventos</span></a>
      <a href="comunidade.html" class="nav-item" data-page="comunidade"><i class="icon-users"></i> <span class="nav-label">Comunidade</span></a>
      <a href="perfil.html" class="nav-item" data-page="perfil"><i class="icon-user"></i> <span class="nav-label">Perfil</span></a>
      <a href="links.html" class="nav-item" data-page="links"><i class="icon-link"></i> <span class="nav-label">Links</span></a>
      <a href="configuracoes.html" class="nav-item" data-page="configuracoes"><i class="icon-settings"></i> <span class="nav-label">Configurações</span></a>
    </nav>
    <div class="sidebar-foot" style="margin-top:auto"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 class="page-title">Meus Links</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openAddModal()">
          <i class="icon-plus"></i> Adicionar Link
        </button>
        <a href="perfil.html" class="me">
          <img id="top-avatar" src="" alt="" />
          <span id="top-name">Olá</span>
        </a>
      </div>
    </header>

    <div class="page-content">
      <div id="links-container" class="content-grid">
          <!-- Links here -->
      </div>
    </div>
  </main>

    <!-- Modal for Add/Edit Link -->
    <div id="link-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Novo Link</h2>
            <form id="link-form" style="margin-top: 1.5rem;">
                <input type="hidden" id="link-id">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="link-titulo" required placeholder="Ex: Meu Portfólio">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" id="link-url" required placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="link-descricao" placeholder="Breve descrição do link">
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <input type="text" id="link-categoria" placeholder="Ex: Portfólio, Recurso, Estudo">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Salvar</button>
                    <button type="button" class="btn btn-outline" onclick="UI.closeModal('link-modal')" style="flex: 1;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
    
    <script src="js/links.js"></script>
</body>
</html>
