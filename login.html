<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SheTech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/icon-static@0.456.0/font/lucide.css">
  <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="auth-page">
  <header class="auth-header">
    <a href="index.html" class="logo"><span class="logo-text">She<span class="accent">Tech</span></span></a>
  </header>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Entrar na SheTech</h2>
      <form id="login-form">
        <div class="form-group"><label>E-mail</label><input type="email" id="email" required /></div>
        <div class="form-group"><label>Senha</label><input type="password" id="senha" required /></div>
        <div class="form-group"><label class="checkbox-label"><input type="checkbox" /> Lembrar de mim</label></div>
        <button type="submit" class="btn btn-primary" style="width:100%"><i class="icon-log-in"></i> Entrar</button>
      </form>
      <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>
  
    <script src="js/login.js"></script>
</body>

</html>
